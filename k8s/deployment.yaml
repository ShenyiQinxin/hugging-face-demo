apiVersion: apps/v1
kind: Deployment
metadata:
  name: hugging-face-demo
  namespace: hf-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hugging-face-demo
  template:
    metadata:
      labels:
        app: hugging-face-demo
    spec:
      # If your GHCR package is PRIVATE, uncomment the next two lines
      # imagePullSecrets:
      #   - name: ghcr-cred

      serviceAccountName: hf-demo          # use dedicated SA, not 'default'
      automountServiceAccountToken: false  # no k8s API token mounted into the pod

      # Pod-level: applies to all containers in the pod
      securityContext:
        runAsNonRoot: true          # reject any container that tries to run as root
        runAsUser: 10001            # matches the 'app' user created in Dockerfile
        runAsGroup: 10001
        fsGroup: 10001              # files written to volumes are owned by this GID
        seccompProfile:
          type: RuntimeDefault      # enables the container runtime's default seccomp filter

      containers:
        - name: app
          image: ghcr.io/shenyiqinxin/hugging-face-demo:main  # will be updated by Actions to :$GITHUB_SHA
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: GRADIO_ROOT_PATH
              value: "http://hf-demo.local:8888"   # public URL seen by browser; empty on HF Spaces

          # Container-level: overrides/extends pod-level securityContext
          securityContext:
            allowPrivilegeEscalation: false   # prevents sudo / setuid escalation
            readOnlyRootFilesystem: true      # filesystem is immutable at runtime
            capabilities:
              drop:
                - ALL                         # drop every Linux capability (NET_RAW, SYS_ADMIN, etc.)

          # Gradio & HuggingFace need writable temp dirs even with readOnlyRootFilesystem
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: hf-cache
              mountPath: /home/app/.cache/huggingface

          readinessProbe:
            httpGet: { path: "/", port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: "/", port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 20

      volumes:
        - name: tmp
          emptyDir: {}              # writable scratch space, wiped on pod restart
        - name: hf-cache
          emptyDir: {}              # model cache, wiped on pod restart (re-downloaded on start)
